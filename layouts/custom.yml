size: { width: 1200, height: 630 }
layers:
  # 1. Background Layer (Custom image with a dark tint overlay for text readability)
  - background:
      image: layouts/background_normal.png
      color: "#000000aa" 

  # 2. Typography Layer (Dynamic page title, auto-shrinks if the text is too long)
  - size: { width: 1000, height: 300 }
    offset: { x: 100, y: 150 }
    typography:
      content: "{{ page.title }}"
      align: start center
      color: white
      overflow: shrink
      line:
        amount: 2
        height: 1.2
      font:
        family: Roboto
        style: Bold

  # 3. Branding Layer (Static agency footer)
  - size: { width: 800, height: 50 }
    offset: { x: 100, y: 500 }
    typography:
      content: "SmartGen Documentation - Connect With Bayezid"
      align: start
      color: "#cccccc"
      font:
        family: Roboto
        style: Regular
